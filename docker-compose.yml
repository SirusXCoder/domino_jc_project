version: '3.8'
services:
  zero:
    image: dgraph/dgraph:latest
    container_name: domino_dgraph_zero
    volumes:
      - dgraph_data:/dgraph
    ports:
      - "5080:5080"
      - "6080:6080"
    command: dgraph zero --my=zero:5080

  alpha:
    image: dgraph/dgraph:latest
    container_name: domino_dgraph_alpha
    volumes:
      - dgraph_data:/dgraph
    ports:
      - "8280:8080"
      - "9080:9080"
    command: dgraph alpha --my=alpha:7080 --zero=zero:5080 --security "whitelist=0.0.0.0/0"
    depends_on:
      - zero

  prometheus:
    image: prom/prometheus:latest
    container_name: domino_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: domino_grafana
    ports:
      - "3000:3000"

volumes:
  dgraph_data:
